# Big Data Pipeline - Online Retail II
# Servisler: Zookeeper, Kafka, Kafka UI, Producer, MLflow
# Not: Spark + Jupyter host'ta (sanal ortamda) çalışır - M2 native ARM64 performansı için

services:

  # ============================================
  # 1. ZOOKEEPER (Kafka için koordinatör)
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:${KAFKA_VERSION}
    container_name: zookeeper
    hostname: zookeeper
    platform: linux/amd64
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bigdata-network

  # ============================================
  # 2. KAFKA BROKER (Mesaj kuyruğu)
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: kafka
    hostname: kafka
    platform: linux/amd64
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_BROKER_PORT}:9092"     # container içi
      - "${KAFKA_EXTERNAL_PORT}:9094"   # host'tan erişim
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - bigdata-network

  # ============================================
  # 3. KAFKA UI (Tarayıcıdan görsel arayüz)
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    platform: linux/amd64
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - bigdata-network

  # ============================================
  # 4. PRODUCER (Kafka'ya veri gönderecek - Faz 3)
  # ============================================
  producer:
    build:
      context: .
      dockerfile: docker/producer/Dockerfile
    image: bigdata-producer:latest
    container_name: producer
    platform: linux/amd64
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./producer:/app
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      PRODUCER_RATE_PER_SECOND: ${PRODUCER_RATE_PER_SECOND}
    networks:
      - bigdata-network
    command: tail -f /dev/null

  # ============================================
  # 5. MLFLOW (Deney takip server'ı)
  # ============================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    platform: linux/amd64
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow-artifacts:/mlflow-artifacts:rw
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns/artifacts
    networks:
      - bigdata-network

# ============================================
# DOCKER NETWORK (servisler birbirini bulsun)
# ============================================
networks:
  bigdata-network:
    driver: bridge
    name: bigdata-network